name: Build Test and Deploy React Application

# Controls when the action will run.
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  build_test:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: npm ci, build and test
        run: |
          npm ci
          npm test

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Generate Jsdoc
        run: |
          npm run jsdoc

      - name: Build
        run: npm run build
        env:
          REACT_APP_API_URL: https://ci-cd-smoky-pi.vercel.app

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  # E2E tests with Cypress
  e2e:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cypress run
        uses: cypress-io/github-action@v6
        env:
          REACT_APP_SERVER_PORT: 3001
        with:
          build: npm run build
          start: npm start

  infra_tests:
    needs: build_test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Create .env for Docker Compose
        run: |
          echo "MYSQL_ROOT_PASSWORD=${{ secrets.MYSQL_ROOT_PASSWORD }}" >> .env
          echo "MYSQL_DATABASE=ynov_ci" >> .env
          echo "MYSQL_USER=root" >> .env
          echo "MYSQL_HOST=db" >> .env
          echo "ADMIN_EMAIL=loise.fenoll@ynov.com" >> .env
          echo "ADMIN_PASSWORD=PvdrTAzTeR247sDnAZBr" >> .env

      - name: Build and start Docker Compose
        run: docker compose up -d --build

      - name: Wait for API to be ready
        run: |
          echo "Waiting for FastAPI server..."
          timeout 120 bash -c 'until curl -sf http://localhost:8000/users; do echo "  still waiting..."; sleep 5; done'
          echo "API is ready."

      - name: Wait for React to be ready
        run: |
          echo "Waiting for React frontend..."
          timeout 180 bash -c 'until curl -sf http://localhost:3000; do echo "  still waiting..."; sleep 5; done'
          echo "React is ready."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install test dependencies
        run: pip install requests pytest

      - name: Run infrastructure tests
        run: pytest tests/test_infrastructure.py -v

      - name: Stop Docker Compose
        if: always()
        run: docker compose down -v

  # Push images to Docker Hub
  docker_hub:
    needs: [e2e, infra_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push React image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./DockerfileReact
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app-react:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app-react:${{ github.sha }}

      - name: Build and push Server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./DockerfileServer
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app-server:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/my-app-server:${{ github.sha }}

  # Deploy backend to Vercel
  deploy_vercel:
    needs: [e2e, infra_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Deploy to Vercel (production)
        run: vercel --prod --token=${{ secrets.VERCEL_TOKEN }} --yes
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  # Publish to NPM job
  publish_npm:
    needs: [e2e, infra_tests]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          registry-url: https://registry.npmjs.org/

      - name: Install dependencies
        run: npm ci

      - name: Authenticate with npm
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc

      - name: build and publish package on NPM
        run: |
          git config --global user.email "kevin.vitali140@gmail.com"
          git config --global user.name "Kévin Vitali"
          npm run build-npm-ci
          REMOTE_VERSION=$(npm view my-app-kvitali version)
          npm version patch --no-git-tag-version
          LOCAL_VERSION=$(node -p "require('./package.json').version")
          if [ "$LOCAL_VERSION" != "$REMOTE_VERSION" ]; then
            npm publish
            git add package.json package-lock.json
            git commit -m "updated version"
            git push
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # Deploy job
  deploy:
    needs: [e2e, infra_tests]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
