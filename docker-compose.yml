# Use root/example as user/password credentials
version: '3.1'

services:

  db:
    container_name: db
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
    volumes:
      - ./sqlfiles:/docker-entrypoint-initdb.d
      - db-data:/var/lib/mysql
    healthcheck:
      test: "mysqladmin ping -h localhost -u root -p$$MYSQL_ROOT_PASSWORD || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  adminer:
    container_name: adminer
    image: adminer
    restart: always
    ports:
      - 8080:8080
    healthcheck:
      test: "curl -f http://localhost:8080 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    depends_on:
      db:
        condition: service_healthy

  server:
    container_name: server
    build:
      context: .
      dockerfile: DockerfileServer
    restart: always
    ports:
      - 8000:8000
    environment:
      - MYSQL_ROOT_PASSWORD=${MYSQL_ROOT_PASSWORD}
      - MYSQL_DATABASE=${MYSQL_DATABASE}
      - MYSQL_USER=${MYSQL_USER}
      - MYSQL_HOST=${MYSQL_HOST}
    healthcheck:
      test: "curl -f http://localhost:8000/users || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy

  react:
    container_name: react
    build:
      context: .
      dockerfile: DockerfileReact
    restart: always
    ports:
      - 3000:3000
    environment:
      - REACT_APP_SERVER_PORT=8000
    volumes:
      - .:/app
      - /app/node_modules
    healthcheck:
      test: "curl -f http://localhost:3000 || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    depends_on:
      server:
        condition: service_healthy
    command: npm start

volumes:
  db-data:
